services:
  - type: web
    name: exchange-report-downloader-api
    env: python
    rootDir: backend
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: ACCESS_PASSWORD
        sync: false
      - key: TOKEN_SECRET
        sync: false
      - key: ALLOWED_ORIGIN
        value: https://download.shijason.com
      - key: JOB_RETENTION_SECONDS
        value: 3600
      - key: MAX_STOCKS_PER_JOB
        value: 5
      - key: MAX_DATE_RANGE_DAYS
        value: 365
      - key: MAX_QUEUED_JOBS
        value: 5
      - key: LOGIN_RATE_LIMIT_PER_MINUTE
        value: 12
      - key: JOB_RATE_LIMIT_PER_MINUTE
        value: 8

